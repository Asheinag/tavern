services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: tavern
      POSTGRES_PASSWORD: tavern
      POSTGRES_DB: tavern
    volumes:
      - postgres_qa_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tavern -d tavern"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: ghcr.io/asheinag/tavern/backend:latest
    environment:
      DATABASE_URL: postgresql+asyncpg://tavern:tavern@db:5432/tavern
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: ghcr.io/asheinag/tavern/frontend:latest
    ports:
      - "80:80"
    depends_on:
      - backend

  playwright:
    image: mcr.microsoft.com/playwright:v1.61.1-noble
    network_mode: host
    working_dir: /qa
    volumes:
      - ./qa:/qa
    command: bash -c "npm install --quiet && npx playwright test"
    profiles:
      - test

volumes:
  postgres_qa_data:
