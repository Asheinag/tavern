services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tavern}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tavern}
      POSTGRES_DB: ${POSTGRES_DB:-tavern}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tavern} -d ${POSTGRES_DB:-tavern}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      target: production
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://tavern:tavern@db:5432/tavern}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      target: development
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
