name: Release

on:
  push:
    branches: [main]

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  build-and-push:
    name: Build & push images
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Lowercase repo name
        run: echo "REPO=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Backend — build & push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          target: production
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/${{ env.REPO }}/backend:latest
            ghcr.io/${{ env.REPO }}/backend:${{ github.sha }}

      - name: Frontend — build & push
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          target: production
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/${{ env.REPO }}/frontend:latest
            ghcr.io/${{ env.REPO }}/frontend:${{ github.sha }}

      - name: Summary
        run: |
          echo "## Образы опубликованы" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Образ | Теги |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| backend  | \`latest\`, \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| frontend | \`latest\`, \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
