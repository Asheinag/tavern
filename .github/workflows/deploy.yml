name: Deploy

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  deploy:
    name: Check & deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Lowercase repo name
        run: echo "REPO=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check backend image
        id: check-backend
        run: |
          if docker manifest inspect ghcr.io/${{ env.REPO }}/backend:latest > /dev/null 2>&1; then
            DIGEST=$(docker manifest inspect ghcr.io/${{ env.REPO }}/backend:latest \
              | python3 -c "import sys,json; m=json.load(sys.stdin); print(m.get('config',{}).get('digest','unknown'))[:19]")
            echo "found=true" >> $GITHUB_OUTPUT
            echo "digest=$DIGEST" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - name: Check frontend image
        id: check-frontend
        run: |
          if docker manifest inspect ghcr.io/${{ env.REPO }}/frontend:latest > /dev/null 2>&1; then
            echo "found=true" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - name: Deploy summary
        run: |
          TAG="${{ github.ref_name }}"

          echo "## Deploy $TAG" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.check-backend.outputs.found }}" = "true" ] && \
             [ "${{ steps.check-frontend.outputs.found }}" = "true" ]; then
            echo "✅ Образы найдены в ghcr.io. Выполнил бы деплой:" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            echo "docker pull ghcr.io/${{ env.REPO }}/backend:latest" >> $GITHUB_STEP_SUMMARY
            echo "docker pull ghcr.io/${{ env.REPO }}/frontend:latest" >> $GITHUB_STEP_SUMMARY
            echo "docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Тег:** \`$TAG\`  " >> $GITHUB_STEP_SUMMARY
            echo "**Образ backend:** \`ghcr.io/${{ env.REPO }}/backend:latest\`  " >> $GITHUB_STEP_SUMMARY
            echo "**Образ frontend:** \`ghcr.io/${{ env.REPO }}/frontend:latest\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Образы не найдены в ghcr.io. Сначала смержи изменения в \`main\` — release workflow соберёт образы." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
